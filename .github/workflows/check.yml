name: Check for new releases

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (UTC); adjust as you like
  workflow_dispatch: {}       # lets you run it manually from the Actions tab

permissions:
  contents: write             # needed to commit the updated state files

concurrency:
  group: release-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tracker
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ITUNES_COUNTRY: ${{ vars.ITUNES_COUNTRY || 'IN' }}
        run: python track_releases.py

      - name: Save state and keep the schedule alive
        if: always()   # run even if the check step errored, so the cron never sleeps
        run: |
          git config user.name "release-bot"
          git config user.email "actions@users.noreply.github.com"
          # Monthly heartbeat: guarantees repo activity within GitHub's 60-day
          # window, so a long stretch with no new releases can't disable the cron.
          date -u +%Y-%m > .heartbeat
          git add -A
          git diff --cached --quiet || git commit -m "Update state / keep-alive [skip ci]"
          git push
